<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | JABU SAMS</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* Basic PC layout styles for the Admin Panel */
    body { background-color: #f4f7f6; display: block; padding: 20px; }
    .admin-header { display: flex; justify-content: space-between; align-items: center; background: #003366; color: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
    .dashboard-stats { display: flex; gap: 20px; margin-bottom: 30px; }
    .stat-card { background: white; padding: 20px; border-radius: 10px; flex: 1; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
    .stat-card h3 { color: #666; font-size: 14px; text-transform: uppercase; }
    .stat-card p { font-size: 32px; font-weight: bold; color: #003366; margin-top: 10px; }
    .stat-card.suspended p { color: #ef4444; }
    
    .data-table { width: 100%; background: white; border-radius: 10px; border-collapse: collapse; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .data-table th, .data-table td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
    .data-table th { background: #eef2f5; color: #333; }
    .status-active { color: #10b981; font-weight: bold; }
    .status-suspended { color: #ef4444; font-weight: bold; }
    
    .action-btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    .suspend-btn { background: #fee2e2; color: #ef4444; }
    .reactivate-btn { background: #d1fae5; color: #10b981; }
    .nav-links { margin-bottom: 15px; }
    .nav-links a { color: #003366; text-decoration: none; font-weight: bold; margin-right: 15px; }
  </style>
</head>
<body>

  <div class="nav-links">
    <a href="index.html">🔙 View Student ID</a>
    <a href="scanner.html">📷 View Gate Scanner</a>
  </div>

  <div class="admin-header">
    <div>
      <h1 style="margin:0;">JABU Security Control</h1>
      <p style="margin:5px 0 0 0; color:#cbd5e1;">Access Management Dashboard</p>
    </div>
    <div style="font-weight: bold;">Admin: Chief Security Officer</div>
  </div>

  <div class="dashboard-stats">
    <div class="stat-card">
      <h3>Total Students</h3>
      <p id="total-students">0</p>
    </div>
    <div class="stat-card">
      <h3>Active Access</h3>
      <p id="active-access">0</p>
    </div>
    <div class="stat-card suspended">
      <h3>Suspended</h3>
      <p id="suspended-users">0</p>
    </div>
  </div>

  <table class="data-table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Matric Number</th>
        <th>Current Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="student-table-body">
      </tbody>
  </table>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  
  <script src="admin.js"></script>
</body>
</html>
