<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login | JABU SAMS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #e2e8f0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Roboto', sans-serif;}
        .login-card { background: white; border-radius: 15px; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .login-header { background: #003366; color: white; padding: 25px 20px; }
        .login-header h2 { margin: 0; font-size: 22px; }
        .login-header p { margin: 5px 0 0 0; font-size: 12px; color: #cbd5e1; }
        .login-body { padding: 30px 20px; }
        input { width: 80%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #cbd5e1; text-align: center; font-size: 24px; letter-spacing: 5px; }
        button { width: 90%; padding: 14px; border: none; border-radius: 8px; background: #003366; color: white; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
        button:hover { background: #002244; }
        .footer-links { margin-top: 20px; }
        .footer-links a { color: #003366; text-decoration: none; font-weight: bold; font-size: 14px; background: white; padding: 10px 20px; border-radius: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);}
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <img src="jabu-logo.png" alt="JABU Logo" style="width: 50px; margin-bottom: 10px;">
            <h2>JABU Security</h2>
            <p>Authorized Personnel Only</p>
        </div>
        
        <div class="login-body">
            <p style="font-size: 14px; color: #64748b; margin-bottom: 15px;">Enter 4-Digit Security PIN</p>
            <input type="password" id="pin-input" maxlength="4" placeholder="••••">
            <button onclick="authenticate()">Authenticate</button>
        </div>
    </div>

    <div class="footer-links">
        <a href="index.html">🔙 Return to Student ID</a>
    </div>

    <script src="login.js"></script>
</body>
</html>
