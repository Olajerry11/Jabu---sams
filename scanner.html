<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gate Scanner | JABU SAMS</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="scanner-body">

  <div class="scanner-container">
    <header class="scanner-header">
      <h2>Gate 1 Checkpoint</h2>
      <p>🟢 Live Camera Active</p>
    </header>

    <div class="camera-box">
      <div id="reader" style="width: 100%; border-radius: 15px; overflow: hidden; border: 4px solid #0f3460; background: #000;"></div>
      <p style="margin-top: 15px;">Point camera at Student QR Code</p>
    </div>

    <div class="scanner-controls">
      <p class="or-text">CAMERA OFFLINE? USE MANUAL OVERRIDE</p>
      <input type="text" placeholder="Enter Matric Number" class="manual-input">
      <button class="btn-manual" onclick="simulateScan()">Manual Verify</button>
    </div>
  </div>

  <div id="result-overlay" class="overlay hidden">
    <h1 id="result-title">STATUS</h1>
    <p id="result-message">Message</p>
    <button class="btn-reset" onclick="resetScanner()">Scan Next Student</button>
  </div>

  <div style="text-align: center; margin-top: 20px;">
    <a href="admin.html" style="color: #4ade80; font-weight: bold; text-decoration: none; margin-right: 15px;">⚙️ Admin Panel</a>
    <a href="index.html" style="color: #4ade80; font-weight: bold; text-decoration: none;">👤 Student ID</a>
  </div>

  <script src="scanner.js"></script>
</body>
</html>
