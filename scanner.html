<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gate Scanner | JABU SAMS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body { background-color: #f4f7f6; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Roboto', sans-serif;}
        .scanner-container { background: #0b192c; color: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .status-indicator { color: #2ecc71; font-size: 14px; margin-bottom: 15px; font-weight: bold; }
        #reader { width: 100%; min-height: 250px; background: black; margin: 15px 0; border-radius: 8px; overflow: hidden; border: 2px solid #1f3a5f;}
        .manual-entry { margin-top: 20px; }
        input { width: 85%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: none; text-align: center; font-size: 16px; font-weight: bold; background: #1f3a5f; color: white; }
        input::placeholder { color: #88a0c0; font-weight: normal; }
        button { width: 90%; padding: 14px; border: none; border-radius: 8px; background: #2ecc71; color: #0b192c; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
        button:hover { background: #27ae60; }
        
        .nav-links { margin-top: 25px; display: flex; gap: 20px; }
        .nav-links a { color: #0b192c; text-decoration: none; font-weight: bold; font-size: 14px; background: white; padding: 10px 20px; border-radius: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* The Full-Screen Result Overlay */
        #result-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; padding: 40px 20px; color: white; text-align: center; z-index: 1000; box-sizing: border-box; display: none; flex-direction: column; justify-content: center; align-items: center;}
        .granted { background-color: #2ecc71; }
        .denied { background-color: #e74c3c; }
        #result-title { font-size: 40px; margin-bottom: 10px; text-transform: uppercase; }
        #result-message { font-size: 20px; margin-bottom: 40px; }
        .scan-next-btn { background: white; color: black; width: auto; padding: 15px 40px; border-radius: 30px; }
    </style>
</head>
<body>

    <div class="scanner-container" id="main-scanner">
        <h2 style="margin-top: 0;">Gate 1 Checkpoint</h2>
        <div class="status-indicator">🟢 Live Camera Active</div>
        
        <div id="reader"></div>
        <p style="font-size: 12px; color: #88a0c0; margin-bottom: 25px;">Point camera at Student QR Code</p>
        
        <div class="manual-entry">
            <p style="font-size: 11px; color: #88a0c0; text-transform: uppercase; letter-spacing: 1px;">Camera offline? Use manual override</p>
            <input type="text" id="matric-input" placeholder="Enter Matric Number">
            <button onclick="manualVerify()">Manual Verify</button>
        </div>
    </div>

    <div id="result-screen">
        <h1 id="result-title">STATUS</h1>
        <p id="result-message">Message</p>
        <button class="scan-next-btn" onclick="resetScanner()">Scan Next Student</button>
    </div>

    <div class="nav-links" id="nav-links">
        <a href="admin.html">⚙️ Admin Panel</a>
        <a href="index.html">👤 Student ID</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <script src="scanner.js"></script>
</body>
</html>
