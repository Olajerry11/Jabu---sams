<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital ID | JABU SAMS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        body { background-color: #e2e8f0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Roboto', sans-serif;}
        .id-card { background: white; border-radius: 15px; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; position: relative;}
        .id-header { background: #003366; color: white; padding: 20px; }
        .id-header h2 { margin: 0; font-size: 22px; }
        .id-header p { margin: 5px 0 0 0; font-size: 12px; color: #cbd5e1; }
        .profile-img { width: 100px; height: 100px; background: #f1f5f9; border-radius: 50%; margin: -50px auto 10px; border: 4px solid white; display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .student-info h3 { margin: 0; font-size: 20px; color: #1e293b; }
        .student-info p { margin: 5px 0; font-size: 14px; color: #64748b; }
        
        .status-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 12px; margin-top: 10px; transition: 0.3s; }
        .status-active { background: #d1fae5; color: #10b981; }
        .status-suspended { background: #fee2e2; color: #ef4444; }
        
        .qr-container { padding: 20px; display: flex; justify-content: center; align-items: center; background: #f8fafc; border-top: 1px solid #e2e8f0; margin-top: 20px;}
        #qrcode img { margin: 0 auto; } /* Centers the generated QR code */
        
        .footer-links { margin-top: 20px; }
        .footer-links a { color: #003366; text-decoration: none; font-weight: bold; font-size: 14px; background: white; padding: 10px 20px; border-radius: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);}
    </style>
</head>
<body>

    <div class="id-card">
        <div class="id-header">
            <h2>JABU SAMS</h2>
            <p>Smart Access Management</p>
        </div>
        
        <div class="profile-img">👤</div>
        
        <div class="student-info">
            <h3 id="student-name">Loading...</h3>
            <p id="student-matric">Loading...</p>
            <div id="student-status" class="status-badge status-active">LOADING</div>
        </div>

        <div class="qr-container">
            <div id="qrcode"></div>
        </div>
    </div>

    <div class="footer-links">
        <a href="login.html">🔒 Staff Login</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <script src="student.js"></script>
</body>
</html>
